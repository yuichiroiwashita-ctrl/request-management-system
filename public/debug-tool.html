<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - Request Management System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #4ec9b0;
      margin-bottom: 20px;
    }
    .section {
      background: #252526;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      border-left: 4px solid #4ec9b0;
    }
    .section h2 {
      color: #569cd6;
      margin-bottom: 15px;
      font-size: 18px;
    }
    .info-item {
      padding: 8px 0;
      border-bottom: 1px solid #3e3e42;
    }
    .info-item:last-child {
      border-bottom: none;
    }
    .label {
      color: #9cdcfe;
      display: inline-block;
      min-width: 200px;
    }
    .value {
      color: #ce9178;
    }
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
      font-family: inherit;
    }
    button:hover {
      background: #1177bb;
    }
    .success { color: #4ec9b0; }
    .error { color: #f48771; }
    .warning { color: #ce9178; }
    #test-results {
      margin-top: 20px;
    }
    pre {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      border: 1px solid #3e3e42;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Request Management System - Debug Page</h1>
    
    <div class="section">
      <h2>📍 Current Environment</h2>
      <div class="info-item">
        <span class="label">URL:</span>
        <span class="value" id="current-url"></span>
      </div>
      <div class="info-item">
        <span class="label">Host:</span>
        <span class="value" id="current-host"></span>
      </div>
      <div class="info-item">
        <span class="label">Protocol:</span>
        <span class="value" id="current-protocol"></span>
      </div>
      <div class="info-item">
        <span class="label">Pathname:</span>
        <span class="value" id="current-pathname"></span>
      </div>
      <div class="info-item">
        <span class="label">User Agent:</span>
        <span class="value" id="user-agent"></span>
      </div>
    </div>

    <div class="section">
      <h2>🧪 Endpoint Tests</h2>
      <div>
        <button onclick="testEndpoint('/', 'GET')">Test / (root)</button>
        <button onclick="testEndpoint('/health', 'GET')">Test /health</button>
        <button onclick="testEndpoint('/debug', 'GET')">Test /debug</button>
        <button onclick="testEndpoint('/app', 'GET')">Test /app</button>
        <button onclick="testEndpoint('/dashboard', 'GET')">Test /dashboard</button>
        <button onclick="testEndpoint('/api/user', 'GET')">Test /api/user</button>
        <button onclick="testEndpoint('/styles.css', 'GET')">Test /styles.css</button>
        <button onclick="testEndpoint('/dashboard.js', 'GET')">Test /dashboard.js</button>
        <button onclick="testEndpoint('/public/index.html', 'GET')">Test /public/index.html</button>
        <button onclick="testEndpoint('/public/styles.css', 'GET')">Test /public/styles.css</button>
      </div>
      <div id="test-results"></div>
    </div>

    <div class="section">
      <h2>📁 Static Files Test</h2>
      <div>
        <button onclick="loadFile('/styles.css')">Load styles.css</button>
        <button onclick="loadFile('/dashboard.js')">Load dashboard.js</button>
        <button onclick="loadFile('/public/index.html')">Load public/index.html</button>
      </div>
      <div id="file-results"></div>
    </div>

    <div class="section">
      <h2>🔗 Quick Links</h2>
      <div>
        <button onclick="window.location.href='/'">Go to /</button>
        <button onclick="window.location.href='/app'">Go to /app</button>
        <button onclick="window.location.href='/dashboard'">Go to /dashboard</button>
        <button onclick="window.location.href='/public/index.html'">Go to /public/index.html</button>
      </div>
    </div>
  </div>

  <script>
    // 環境情報の表示
    document.getElementById('current-url').textContent = window.location.href;
    document.getElementById('current-host').textContent = window.location.host;
    document.getElementById('current-protocol').textContent = window.location.protocol;
    document.getElementById('current-pathname').textContent = window.location.pathname;
    document.getElementById('user-agent').textContent = navigator.userAgent;

    async function testEndpoint(endpoint, method) {
      const resultsDiv = document.getElementById('test-results');
      const startTime = Date.now();
      
      try {
        const response = await fetch(endpoint, { method });
        const duration = Date.now() - startTime;
        const contentType = response.headers.get('content-type');
        
        let body;
        if (contentType && contentType.includes('application/json')) {
          body = await response.json();
        } else {
          body = await response.text();
        }
        
        const status = response.ok ? 'success' : 'error';
        
        resultsDiv.innerHTML = `
          <pre>
<span class="${status}">${method} ${endpoint}</span>
Status: ${response.status} ${response.statusText}
Content-Type: ${contentType}
Duration: ${duration}ms

Response:
${typeof body === 'object' ? JSON.stringify(body, null, 2) : body.substring(0, 500)}
          </pre>
        `;
      } catch (error) {
        const duration = Date.now() - startTime;
        resultsDiv.innerHTML = `
          <pre>
<span class="error">${method} ${endpoint}</span>
Error: ${error.message}
Duration: ${duration}ms
          </pre>
        `;
      }
    }

    async function loadFile(path) {
      const resultsDiv = document.getElementById('file-results');
      const startTime = Date.now();
      
      try {
        const response = await fetch(path);
        const duration = Date.now() - startTime;
        const contentType = response.headers.get('content-type');
        const text = await response.text();
        
        const status = response.ok ? 'success' : 'error';
        
        resultsDiv.innerHTML = `
          <pre>
<span class="${status}">GET ${path}</span>
Status: ${response.status} ${response.statusText}
Content-Type: ${contentType}
Content-Length: ${text.length} bytes
Duration: ${duration}ms

First 500 chars:
${text.substring(0, 500)}
          </pre>
        `;
      } catch (error) {
        const duration = Date.now() - startTime;
        resultsDiv.innerHTML = `
          <pre>
<span class="error">GET ${path}</span>
Error: ${error.message}
Duration: ${duration}ms
          </pre>
        `;
      }
    }

    // 自動テスト実行
    setTimeout(() => {
      testEndpoint('/health', 'GET');
    }, 500);
  </script>
</body>
</html>
