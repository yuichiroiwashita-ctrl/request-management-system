<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request - 社内リクエスト管理</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="app-name">Request</h1>
      <p class="app-subtitle">社内リクエスト管理</p>
      
      <div style="margin-top: 30px; padding: 15px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; font-size: 14px; text-align: left;">
        <strong>⚠️ サーバー未起動</strong>
        <p style="margin: 10px 0 0 0;">
          現在、Node.jsサーバーが起動していないため、Talknote認証が利用できません。<br>
          GenSpark Spaceの設定を「Node.js Application」に変更してください。
        </p>
      </div>

      <a href="#" class="btn-login" style="margin-top: 20px; opacity: 0.5; cursor: not-allowed;">
        Talknoteでログイン（利用不可）
      </a>

      <div style="margin-top: 30px; padding-top: 30px; border-top: 1px solid #e0e0e0; font-size: 14px;">
        <p style="color: #666; margin-bottom: 10px;">デバッグ用リンク:</p>
        <a href="/public/home.html" style="color: #2563EB;">→ ホームに戻る</a><br>
        <a href="/public/debug-tool.html" style="color: #2563EB; margin-top: 5px; display: inline-block;">→ デバッグツール</a>
      </div>
    </div>
  </div>

  <script>
    // サーバーが動いているか確認
    fetch('/health')
      .then(res => {
        if (res.ok) {
          console.log('Server is running!');
          // サーバーが動いている場合は正常なログインボタンを表示
          const btn = document.querySelector('.btn-login');
          btn.href = '/api/auth/login';
          btn.style.opacity = '1';
          btn.style.cursor = 'pointer';
          btn.textContent = 'Talknoteでログイン';
          
          // 警告メッセージを削除
          const warning = document.querySelector('.login-card > div');
          if (warning) warning.remove();
        }
      })
      .catch(err => {
        console.log('Server is not running');
      });
  </script>
</body>
</html>
