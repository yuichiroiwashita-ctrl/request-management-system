<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request - Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin: 0 0 20px 0; }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #000;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 20px;
    }
    .info {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ サーバーが正常に動作しています</h1>
    <p>Request 管理システム v2.0</p>
    <a href="/app" onclick="testApp(event)">アプリを開く</a>
    <div class="info">
      <p><strong>デバッグ情報:</strong></p>
      <p id="location">Location: <span></span></p>
      <p id="host">Host: <span></span></p>
    </div>
  </div>
  
  <script>
    document.getElementById('location').querySelector('span').textContent = window.location.href;
    document.getElementById('host').querySelector('span').textContent = window.location.host;
    
    function testApp(e) {
      e.preventDefault();
      console.log('Testing app access...');
      fetch('/api/user')
        .then(res => {
          console.log('API response status:', res.status);
          if (res.status === 401) {
            console.log('Redirecting to /app (login page)');
            window.location.href = '/app';
          } else {
            console.log('Redirecting to /dashboard');
            window.location.href = '/dashboard';
          }
        })
        .catch(err => {
          console.error('Error:', err);
          console.log('Redirecting to /app due to error');
          window.location.href = '/app';
        });
    }
  </script>
</body>
</html>
